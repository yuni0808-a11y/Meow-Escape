<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body { background: #eee; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
  .cat-climb {
    width: 136px;
    height: 288px;
    background-image: url('cat_climb_sprite.png');
    background-repeat: no-repeat;
    transform: scale(1.5); /* 실제 게임 크기에 맞게 조정 */
  }
</style>
</head>
<body>
  <div class="cat-climb" id="cat"></div>

<script>
  const totalFrames = 4;
  const frameW = 136;
  const frameH = 288;

  const el = document.getElementById('cat');
  let i = 0;

  function setFrame(idx) {
    el.style.backgroundPosition = `-${idx * frameW}px 0px`;
  }

  setInterval(() => {
    setFrame(i);
    i = (i + 1) % totalFrames;
  }, 1000 / 8); // 사다리 오르기 8fps
</script>
</body>
</html>
